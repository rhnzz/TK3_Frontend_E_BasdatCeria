<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Transaksi - AeroMiles</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="dashboard-content">
        <div class="page-header"><h1 class="page-title">Laporan & Riwayat Transaksi</h1></div>

        <!-- 1. Statistik Ringkasan (Hasil get_statistik_sistem) -->
        <div class="flex-row margin-top-md" style="margin-bottom: 24px;">
            <div class="table-card flex-1 section-title"><p class="text-gray">Total Miles Beredar</p><h3>0</h3></div>
            <div class="table-card flex-1 section-title"><p class="text-gray">Total Redeem (Bulan Ini)</p><h3>0</h3></div>
            <div class="table-card flex-1 section-title"><p class="text-gray">Klaim Miles Disetujui</p><h3>0</h3></div>
        </div>

        <!-- 2. Top Member (Hasil get_top_member) -->
        <div class="section-title"><h3>Top 5 Member (Miles Tertinggi)</h3></div>
        <div class="table-card" style="margin-bottom: 32px;">
            <table class="data-table">
                <thead><tr><th>No. Member</th><th>Email</th><th>Total Miles</th></tr></thead>
                <tbody><tr><td colspan="3" style="text-align:center; padding:20px; color:#8D9EB8;">Belum ada data member</td></tr></tbody>
            </table>
        </div>

        <!-- 3. Riwayat Transaksi (Hasil get_riwayat_transaksi_all) -->
        <div class="section-title"><h3>Riwayat Seluruh Transaksi</h3></div>
        <div class="table-card">
            <table class="data-table">
                <thead><tr><th>Waktu</th><th>Email</th><th>Jenis</th><th>Mutasi</th><th>Keterangan</th><th>Aksi</th></tr></thead>
                <tbody><tr><td colspan="6" style="text-align:center; padding:20px; color:#8D9EB8;">Belum ada riwayat transaksi</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        fetch('navbar-staf.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                const activeLink = document.querySelector('.nav-item[href="laporan-transaksi.html"]');
                if (activeLink) activeLink.classList.add('active');
            });
    </script>
</body>
</html>
