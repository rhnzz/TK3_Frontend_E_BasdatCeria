<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Miles - AeroMiles</title>
    <link rel="stylesheet" href="global.css">
    <style>
        /* Sedikit tambahan khusus buat tabel history agar rapi */
        .table-container {
            width: 100%;
            background: white;
            border-radius: 8px;
            border: 1px solid #D9D9D9;
            margin-top: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            color: #072C64;
            padding: 15px;
            border-bottom: 2px solid #06285B;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .text-danger { color: #C00F0C; font-weight: bold; }
        .text-success { color: #14AE5C; font-weight: bold; }
        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            text-align: center;
            display: inline-block;
            min-width: 70px;
        }
        .badge-kirim { border: 1px solid #072C64; color: #072C64; }
        .badge-terima { background: #072C64; color: white; }
    </style>
</head>
<body class="bg-light">

    <div class="main-content">
        <div class="header-text" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="title">Transfer Miles</h1>
            <!-- Tombol Transfer Baru -->
            <button class="btn btn-primary" onclick="openTransferModal()">+ Transfer Baru</button>
        </div>

        <!-- TABEL HISTORY -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Member</th>
                        <th>Jumlah Miles</th>
                        <th>Catatan</th>
                        <th>Tipe</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Row 1 -->
                    <tr>
                        <td>2024-10-01</td>
                        <td>
                            <strong>Jane Smith</strong><br>
                            <small>janesmith@example.com</small>
                        </td>
                        <td class="text-danger">-5000</td>
                        <td>Hadiah Ulang Tahun</td>
                        <td><span class="badge badge-kirim">Kirim</span></td>
                        <td><button class="btn-icon">🗑️</button></td>
                    </tr>
                    <!-- Row 2 -->
                    <tr>
                        <td>2024-10-01</td>
                        <td>
                            <strong>Budi</strong><br>
                            <small>budi@example.com</small>
                        </td>
                        <td class="text-success">+2000</td>
                        <td>-</td>
                        <td><span class="badge badge-terima">Terima</span></td>
                        <td><button class="btn-icon">🗑️</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- POP UP (MODAL) TRANSFER BARU -->
    <div class="modal-overlay" id="transferModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div class="auth-card" style="position: relative; width: 500px;">
            <button onclick="closeTransferModal()" style="position: absolute; right: 20px; top: 20px; background: none; border: none; cursor: pointer; font-size: 20px;">✕</button>
            
            <div class="section-title">
                <h3>Transfer Miles</h3>
            </div>

            <div class="input-group">
                <label>Email Penerima</label>
                <input type="email" placeholder="Contoh: x@example.com">
            </div>

            <div class="input-group">
                <label>Jumlah Miles</label>
                <input type="number" placeholder="Masukkan jumlah miles">
            </div>

            <div class="input-group">
                <label>Catatan (Opsional)</label>
                <input type="text" placeholder="Contoh: Hadiah">
            </div>

            <button class="btn btn-primary btn-full">Simpan</button>
        </div>
    </div>

    <script>
        // Fungsi buat buka & tutup pop-up transfer
        function openTransferModal() {
            document.getElementById('transferModal').style.display = 'flex';
        }
        function closeTransferModal() {
            document.getElementById('transferModal').style.display = 'none';
        }
    </script>

</body>
</html>
