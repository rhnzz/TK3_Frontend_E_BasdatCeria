<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Hadiah & Penyedia - AeroMiles</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="dashboard-content">
        
        <div class="page-header">
            <h1 class="page-title">Kelola Hadiah & Penyedia</h1>
            <div class="flex-row" style="width: auto; gap: 12px; align-items: center;">
                <select id="filter-penyedia" style="width: 180px; height: 40px;">
                    <option value="all">Semua Penyedia</option>
                </select>
                
                <select id="filter-status" style="width: 150px; height: 40px;">
                    <option value="all">Semua Status</option>
                    <option value="aktif">Aktif</option>
                    <option value="berakhir">Berakhir</option>
                </select>

                <button class="btn btn-primary btn-icon" id="btn-tambah" style="height: 40px;">
                    <span class="material-symbols-outlined icon-small">add</span>
                    Tambah Hadiah
                </button>
            </div>
        </div>

        <div class="table-card">
            <table class="data-table" id="hadiah-table">
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Nama</th>
                        <th>Deskripsi</th>
                        <th>Penyedia</th>
                        <th>Miles</th>
                        <th>Periode</th>
                        <th>Aksi</th> 
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" style="text-align: center; color: #8D9EB8; padding: 24px;">Belum ada data hadiah</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="reward-modal" class="modal-overlay">
        <div class="modal-content table-card">
            <div class="modal-header">
                <h3>Tambah Hadiah</h3>
                <button id="modal-close" class="btn-icon-only text-gray">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="reward-form" action="#" method="POST">
                    <div class="flex-row gap-xs">
                        <div class="input-group flex-1">
                            <label>Nama Hadiah<span class="text-red">*</span></label>
                            <input type="text" name="nama" placeholder="Isi Nama Hadiah" required>
                        </div>
                        <div class="input-group flex-1">
                            <label>Penyedia<span class="text-red">*</span></label>
                            <select name="id_penyedia" required>
                                <option value="" disabled selected>Pilih Penyedia</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Deskripsi Hadiah</label>
                        <textarea name="deskripsi" placeholder="Isi Deskripsi Hadiah" rows="3"></textarea>
                    </div>

                    <div class="flex-row gap-xs">
                        <div class="input-group flex-1">
                            <label>Jumlah Miles<span class="text-red">*</span></label>
                            <input type="number" name="miles" placeholder="Isi Jumlah Miles" min="0" required>
                        </div>
                        <div class="input-group flex-1">
                            <label>Periode Awal<span class="text-red">*</span></label>
                            <input type="date" name="valid_start_date" required>
                        </div>
                        <div class="input-group flex-1">
                            <label>Periode Akhir<span class="text-red">*</span></label>
                            <input type="date" name="program_end" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="modal-cancel" class="btn btn-outline">Batal</button>
                <button type="submit" form="reward-form" class="btn btn-primary">Simpan</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content table-card">
            <div class="modal-header">
                <h3>Edit Hadiah</h3>
                <button id="edit-modal-close" class="btn-icon-only text-gray">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="edit-form" action="#" method="POST">
                    <div class="flex-row gap-xs">
                        <div class="input-group" style="flex: 0.4;">
                            <label>Kode Hadiah</label>
                            <input type="text" name="kode_hadiah" value="" readonly style="background-color: #F5F5F5; color: #8D9EB8;">
                        </div>
                        <div class="input-group flex-1">
                            <label>Nama Hadiah<span class="text-red">*</span></label>
                            <input type="text" name="nama" placeholder="Isi Nama Hadiah" value="" required>
                        </div>
                    </div>

                    <div class="flex-row gap-xs">
                        <div class="input-group flex-1">
                            <label>Penyedia<span class="text-red">*</span></label>
                            <select name="id_penyedia" required>
                                <option value="" disabled selected>Pilih Penyedia</option>
                            </select>
                        </div>
                        <div class="input-group flex-1">
                            <label>Jumlah Miles<span class="text-red">*</span></label>
                            <input type="number" name="miles" placeholder="Isi Jumlah Miles" value="" min="0" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Deskripsi Hadiah</label>
                        <textarea name="deskripsi" placeholder="Isi Deskripsi Hadiah" rows="3"></textarea>
                    </div>

                    <div class="flex-row gap-xs">
                        <div class="input-group flex-1">
                            <label>Periode Awal<span class="text-red">*</span></label>
                            <input type="date" name="valid_start_date" value="" required>
                        </div>
                        <div class="input-group flex-1">
                            <label>Periode Akhir<span class="text-red">*</span></label>
                            <input type="date" name="program_end" value="" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="edit-modal-cancel" class="btn btn-outline">Batal</button>
                <button type="submit" form="edit-form" class="btn btn-primary">Simpan</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-content table-card modal-sm">
            <div class="modal-header" style="margin-bottom: 16px;">
                <h3 class="modal-title-sm" style="margin-bottom: 0;">Hapus Hadiah?</h3>
                <button id="delete-modal-close" class="btn-icon-only text-gray">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <form id="delete-form" action="#" method="POST">
                <div class="modal-body text-left">
                    <p class="modal-desc-sm">Hanya hadiah yang sudah berakhir yang dapat dihapus secara permanen.</p>
                </div>
                <div class="modal-footer" style="margin-top: 24px;">
                    <button type="button" id="delete-modal-cancel" class="btn btn-outline">Batal</button>
                    <button type="submit" id="delete-modal-confirm" class="btn btn-primary" style="background-color: #C00F0C; border: none;">Hapus</button>
                </div>
            </form>
            
        </div>
    </div>

    <script>
        fetch('navbar-staf.html')
            .then(response => {
                if (!response.ok) throw new Error("Navbar staf tidak ditemukan");
                return response.text();
            })
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                
                const activeLink = document.querySelector('.nav-item[href="kelola-hadiah.html"]');
                if (activeLink) {
                    activeLink.classList.add('active');
                }
            })
            .catch(error => console.error('Error loading navbar:', error));

        const filterPenyedia = document.getElementById('filter-penyedia');
        const filterStatus = document.getElementById('filter-status');
        const tableRows = document.querySelectorAll('#hadiah-table tbody tr');

        function applyFilters() {
            const valPenyedia = filterPenyedia.value;
            const valStatus = filterStatus.value;

            tableRows.forEach(row => {
                if(row.children[0].colSpan > 1) return; 

                const rowPenyedia = row.getAttribute('data-penyedia');
                const rowStatus = row.getAttribute('data-status');

                const matchPenyedia = (valPenyedia === 'all') || (rowPenyedia === valPenyedia);
                const matchStatus = (valStatus === 'all') || (rowStatus === valStatus);

                if (matchPenyedia && matchStatus) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        filterPenyedia.addEventListener('change', applyFilters);
        filterStatus.addEventListener('change', applyFilters);

        const tambahButton = document.getElementById('btn-tambah'); 
        const rewardModal = document.getElementById('reward-modal');
        const rewardClose = document.getElementById('modal-close');
        const rewardCancel = document.getElementById('modal-cancel');

        tambahButton.addEventListener('click', () => rewardModal.classList.add('is-visible'));
        rewardClose.addEventListener('click', () => rewardModal.classList.remove('is-visible'));
        if(rewardCancel) rewardCancel.addEventListener('click', () => rewardModal.classList.remove('is-visible'));

        document.addEventListener('click', function(e) {
            if(e.target.closest('.btn-edit')) {
                document.getElementById('edit-modal').classList.add('is-visible');
            }
        });
        document.getElementById('edit-modal-close').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('is-visible'));
        document.getElementById('edit-modal-cancel').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('is-visible'));

        document.addEventListener('click', function(e) {
            if(e.target.closest('.btn-delete')) {
                document.getElementById('delete-modal').classList.add('is-visible');
            }
        });
        document.getElementById('delete-modal-close').addEventListener('click', () => document.getElementById('delete-modal').classList.remove('is-visible'));
        document.getElementById('delete-modal-cancel').addEventListener('click', () => document.getElementById('delete-modal').classList.remove('is-visible'));

        window.addEventListener('click', (e) => {
            if (e.target === rewardModal) rewardModal.classList.remove('is-visible');
            if (e.target === document.getElementById('edit-modal')) document.getElementById('edit-modal').classList.remove('is-visible');
            if (e.target === document.getElementById('delete-modal')) document.getElementById('delete-modal').classList.remove('is-visible');
        });
    </script>
</body>
</html>
