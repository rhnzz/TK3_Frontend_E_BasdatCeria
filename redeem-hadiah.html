<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem Hadiah - AeroMiles</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="dashboard-content">
        <div class="page-header">
            <h1 class="page-title">Katalog Hadiah</h1>
            <span id="user-miles-display" class="badge">Miles Anda: 0</span>
        </div>

        <div class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Kode Hadiah</th>
                        <th>Nama Hadiah</th>
                        <th>Penyedia</th>
                        <th>Harga</th>
                        <th>Validitas</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="reward-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #8D9EB8; padding: 24px;">Belum ada data hadiah tersedia</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="redeem-modal" class="modal-overlay">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 class="modal-title-sm">Konfirmasi Penukaran</h3>
                <button id="modal-close" class="btn-icon-only text-gray">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-desc-sm">Apakah Anda yakin ingin menukar Miles untuk <strong id="selected-reward-name">-</strong>?</p>
                <p class="warning-text text-red" style="margin-top: 12px; font-size: 13px;">*Saldo Miles Anda akan langsung berkurang setelah konfirmasi.</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-batal" class="btn btn-outline">Batal</button>
                <button type="button" id="btn-konfirmasi" class="btn btn-primary">Tukar Sekarang</button>
            </div>
        </div>
    </div>

    <script>
        fetch('navbar-member.html')
            .then(response => {
                if (!response.ok) throw new Error("Navbar member tidak ditemukan");
                return response.text();
            })
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                
                const activeLink = document.querySelector('.nav-item[href="redeem-hadiah.html"]');
                if (activeLink) activeLink.classList.add('active');
            })
            .catch(error => console.error('Error loading navbar:', error));

        const redeemModal = document.getElementById('redeem-modal');
        const closeModal = () => redeemModal.classList.remove('is-visible');

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.btn-redeem'); 
            if (btn) {
                const rewardName = btn.closest('tr').cells[1].innerText;
                document.getElementById('selected-reward-name').innerText = rewardName;
                redeemModal.classList.add('is-visible');
            }
        });

        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('btn-batal').addEventListener('click', closeModal);
        
        window.addEventListener('click', (e) => {
            if (e.target === redeemModal) closeModal();
        });

        document.getElementById('btn-konfirmasi').addEventListener('click', () => {
            alert('Proses penukaran sedang dikirim ke sistem...');
            closeModal();
        });
    </script>
</body>
</html>
