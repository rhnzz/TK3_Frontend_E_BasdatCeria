<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Redeem Hadiah - AeroMiles</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="dashboard-content">
        <div class="page-header">
            <h1 class="page-title">Katalog Hadiah</h1>
            <span class="badge">Miles Anda: 0</span>
        </div>

        <div class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Kode Hadiah</th>
                        <th>Nama Hadiah</th>
                        <th>Penyedia</th>
                        <th>Harga (Miles)</th>
                        <th>Validitas</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" style="text-align: center; color: #8D9EB8; padding: 24px;">Belum ada data hadiah tersedia</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        fetch('navbar-member.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading navbar:', error));
    </script>
</body>
</html>
