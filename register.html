<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AeroMiles</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-light">

    <nav class="navbar">
        <div class="nav-brand">
            <svg width="29" height="29" viewBox="0 0 29 29" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.4615 6.72485L22.5586 1.62616C23.1325 1.06164 23.9061 0.746734 24.7111 0.750026C25.516 0.753318 26.2871 1.07454 26.8563 1.64374C27.4255 2.21293 27.7467 2.98398 27.75 3.78893C27.7533 4.59388 27.4384 5.36753 26.8738 5.94136L21.7751 11.0385L24.5339 24.7646C24.8866 26.5207 21.481 28.9673 20.5744 26.6408L16.5369 16.2783L11.2941 21.5211C11.5493 24.5845 11.6048 25.6037 9.45694 27.75L6.1924 22.3076L0.75 19.0431C2.89634 16.8952 3.91548 16.9492 6.9789 17.2059L12.2217 11.9646L1.85919 7.9256C-0.467261 7.01903 1.97927 3.6119 3.73537 3.96612L17.4615 6.72485Z" stroke="#E6E9EE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="brand-text">AeroMiles</span>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-outline">Login</a>
            <a href="register.html" class="btn btn-dark">Register</a>
        </div>
    </nav>

    <main class="main-content">
        
        <div class="header-text">
            <h1 class="title">Daftar Akun Baru</h1>
            <p class="subtitle">Bergabung dengan program AeroMiles</p>
        </div>

        <div class="auth-card">
            <form action="#" method="POST">
                
                <div class="section-title">
                    <h3>Registrasi</h3>
                    <p>Pilih peran dan lengkapi data Anda</p>
                </div>

                <div class="role-selector">
                    <input type="radio" id="role-member" name="role" value="member" checked>
                    <label for="role-member" class="role-btn">Member</label>

                    <input type="radio" id="role-staff" name="role" value="staff">
                    <label for="role-staff" class="role-btn">Staff</label>
                </div>

                <div class="input-group">
                    <label>Email<span class="text-red">*</span></label>
                    <input type="email" name="email" placeholder="Isi Alamat Email" required>
                </div>
                
                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Kata Sandi<span class="text-red">*</span></label>
                        <input type="password" name="password" placeholder="Isi Kata Sandi" required>
                    </div>
                    <div class="input-group flex-1">
                        <label>Konfirmasi Kata Sandi<span class="text-red">*</span></label>
                        <input type="password" name="confirm_password" placeholder="Ketik Ulang Kata Sandi" required>
                    </div>
                </div>

                <div class="section-title margin-top-md">
                    <h3>Data Pribadi</h3>
                </div>

                <div class="input-group">
                    <label>Salutasi<span class="text-red">*</span></label>
                    <select name="salutation" required>
                        <option value="" disabled selected>Pilih</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Dr.">Dr.</option> 
                    </select>
                </div>

                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Nama Depan<span class="text-red">*</span></label>
                        <input type="text" name="first_mid_name" placeholder="Isi Nama Depan" required>
                    </div>
                    <div class="input-group flex-1">
                        <label>Nama Belakang<span class="text-red">*</span></label>
                        <input type="text" name="last_name" placeholder="Isi Nama Belakang" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Kewarganegaraan<span class="text-red">*</span></label>
                    <select name="kewarganegaraan" required>
                        <option value="" disabled selected>Pilih</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Asing">Asing</option>
                    </select>
                </div>

                <div class="flex-row">
                    <div class="input-group" style="flex: 0.4;">
                        <label>Kode Negara<span class="text-red">*</span></label>
                        <select name="country_code" required>
                            <option value="" disabled selected>Pilih</option>
                            <option value="+62">+62 (ID)</option>
                            <option value="+1">+1 (US)</option>
                        </select>
                    </div>
                    <div class="input-group flex-1">
                        <label>Nomor HP<span class="text-red">*</span></label>
                        <input type="tel" name="mobile_number" placeholder="Isi Nomor HP" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Tanggal Lahir<span class="text-red">*</span></label>
                    <input type="date" name="tanggal_lahir" required> 
                </div>

                <div id="field-maskapai" style="display: none;">
                    <div class="section-title margin-top-md">
                        <h3>Data Staff</h3>
                    </div>

                    <div class="input-group">
                        <label>Kode Maskapai<span class="text-red">*</span></label>
                        <select name="kode_maskapai" id="input-maskapai">
                            <option value="" disabled selected>Pilih Maskapai</option>
                            <option value="GA">GA - Garuda Indonesia</option>
                            <option value="QG">QG - Citilink</option>
                        </select>
                    </div>
                </div>

                <p class="text-red warning-text">*Wajib Diisi</p>
                <button type="submit" class="btn btn-primary btn-full">Register</button>
            </form>
        </div>

    </main>

    <script>
        const radioMember = document.getElementById('role-member');
        const radioStaff = document.getElementById('role-staff');
        const fieldMaskapai = document.getElementById('field-maskapai');
        const inputMaskapai = document.getElementById('input-maskapai');

        // jika staff dipilih
        radioStaff.addEventListener('change', () => {
            fieldMaskapai.style.display = 'block';
            inputMaskapai.required = true;
        });

        // jika member dipilih
        radioMember.addEventListener('change', () => {
            fieldMaskapai.style.display = 'none';
            inputMaskapai.required = false;
            inputMaskapai.value = ""; 
        });
    </script>

</body>
</html>
